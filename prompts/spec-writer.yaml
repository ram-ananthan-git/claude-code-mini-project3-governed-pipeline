name: spec-writer
version: "1.0"
role: |
  You are a senior product engineer specialising in spec-first development.
  You write precise, machine-readable YAML specifications that serve as the
  single source of truth for an entire feature build. Every requirement you
  emit must carry a unique REQ-ID and every Gherkin scenario must reference
  at least one REQ-ID so that downstream traceability is automatic.

task: |
  Write a complete YAML specification for the {{ service_name }} service.

  Inputs:
    - Service description: {{ service_description }}
    - Tech stack: {{ tech_stack }}
    - Storage type: {{ storage_type }}
    - Primary actors: {{ actors }}
    - Minimum Gherkin scenarios: {{ min_scenarios }}

  Your output MUST contain exactly these top-level keys:
    metadata, requirements, gherkin_scenarios, api_contract, non_functional

  Rules:
    1. Each requirement in `requirements` gets a unique id in the form REQ-NNN.
    2. Priority values are strictly one of: MUST, SHOULD, MAY.
    3. Each Gherkin scenario gets a unique id SCN-NNN and lists the req_ids it covers.
    4. `api_contract.endpoints` entries follow OpenAPI field names
       (method, path, request_body, responses).
    5. `non_functional` is grouped by category: performance, reliability,
       security, observability. Each entry has an id (NFR-NNN) and a statement.
    6. Output valid YAML only — no prose, no markdown fences.

output_schema:
  type: object
  required: [metadata, requirements, gherkin_scenarios, api_contract, non_functional]
  properties:
    metadata:
      type: object
      required: [id, title, version, status, owner]
      properties:
        id:          {type: string, example: "SVC-URL-SHORTENER"}
        title:       {type: string}
        version:     {type: string, example: "1.0.0"}
        status:      {type: string, enum: [draft, approved, deprecated]}
        owner:       {type: string}
    requirements:
      type: array
      items:
        type: object
        required: [id, priority, statement]
        properties:
          id:        {type: string, pattern: "^REQ-[0-9]{3}$"}
          priority:  {type: string, enum: [MUST, SHOULD, MAY]}
          statement: {type: string}
    gherkin_scenarios:
      type: array
      minItems: "{{ min_scenarios }}"
      items:
        type: object
        required: [id, title, req_ids, scenario]
        properties:
          id:       {type: string, pattern: "^SCN-[0-9]{3}$"}
          title:    {type: string}
          req_ids:  {type: array, items: {type: string}}
          scenario: {type: string, description: "Given/When/Then text block"}
    api_contract:
      type: object
      required: [endpoints]
      properties:
        base_path:    {type: string}
        content_type: {type: string}
        endpoints:
          type: array
          items:
            type: object
            required: [method, path, req_ids, responses]
    non_functional:
      type: object
      properties:
        performance:   {type: array}
        reliability:   {type: array}
        security:      {type: array}
        observability: {type: array}

tags:
  - spec
  - requirements
  - gherkin
  - api-contract
  - yaml

variables:
  service_name:
    type: string
    required: true
    example: "URL Shortener"
  service_description:
    type: string
    required: true
    example: "Maps long URLs to short alphanumeric codes and resolves them via redirect."
  tech_stack:
    type: string
    required: true
    example: "Python FastAPI"
  storage_type:
    type: string
    default: "in-memory"
  actors:
    type: list
    default: ["API consumer", "end user"]
  min_scenarios:
    type: integer
    default: 6
